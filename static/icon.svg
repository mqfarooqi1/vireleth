<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- soft glow -->
  <circle cx="256" cy="214" r="150" fill="url(#glow)"/>
  <!-- four-point spark -->
  <path d="M256 120
           C 268 190, 300 222, 372 236
           C 300 250, 268 282, 256 352
           C 244 282, 212 250, 140 236
           C 212 222, 244 190, 256 120 Z"
        fill="#ffffff"/>
  <!-- small orbiting node -->
  <circle cx="372" cy="360" r="22" fill="#ffffff" opacity="0.9"/>
  <circle cx="150" cy="150" r="12" fill="#ffffff" opacity="0.7"/>
</svg>
